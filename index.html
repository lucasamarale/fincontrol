<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#e8ede9;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:20px}

.label{color:#6b7280;font-size:11px;letter-spacing:2px;text-transform:uppercase}
.phone{width:390px;height:844px;background:#f2f4f3;border-radius:48px;overflow:hidden;position:relative;box-shadow:0 0 0 10px #1c1c1e,0 0 0 12px #3a3a3c,0 40px 80px rgba(0,0,0,.7);display:flex;flex-direction:column}
.phone::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:126px;height:34px;background:#1c1c1e;border-radius:0 0 20px 20px;z-index:99}
#root{width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden}
</style>
</head>
<body>
<div class="wrap">
  <div class="label">FinControl · MVP · Etapa 3</div>
  <div class="phone"><div id="root"></div></div>

function load(k,fb){try{const s=localStorage.getItem(k);return s?JSON.parse(s):fb}catch{return fb}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

/* ── HELPERS ── */
const fmt=(n,d=2)=>'R$ '+Number(n).toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtD=(d)=>d?d.split('-').reverse().join('/'):'-';
const today=()=>new Date().toISOString().slice(0,10);

/* ── LOGO ── */

/* ── STATUS BAR (iPhone-accurate) ── */
const SB=({dark})=>{

      {/* Cellular — 4 bars iPhone style */}
      <svg width={18} height={12} viewBox="0 0 18 12">
        <rect x={0}  y={8}  width={3} height={4}  rx={1} fill={c}/>
        <rect x={5}  y={5}  width={3} height={7}  rx={1} fill={c}/>
        <rect x={10} y={2}  width={3} height={10} rx={1} fill={c}/>
        <rect x={15} y={0}  width={3} height={12} rx={1} fill={c}/>
      </svg>
      {/* WiFi — exact Apple arcs */}

        <path d="M8 9.5 a.8.8 0 1 0 .01 0z" fill={c}/>

        <rect x={2}  y={2}  width={18}   height={9}    rx={2}   fill={c}/>
        <path d="M24.5 4.3 C26 4.3 26 8.7 24.5 8.7" stroke={c} strokeWidth={1.1} fill="none" strokeLinecap="round"/>
      </svg>
    </div>
  </div>
  );
};

/* ── ICON ── */
const icons={
  home: 'M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z M9 21V12h6v9',
  chart:'M18 20V10M12 20V4M6 20v-6',
  add:  'M12 5v14M5 12h14',
  card: 'M2 7a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V7z M2 11h20',
  user: 'M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2 M12 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8z',
  back: 'M15 18l-6-6 6-6',
  x:    'M18 6L6 18M6 6l12 12',
  search:'M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z',
  bell: 'M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9 M13.73 21a2 2 0 0 1-3.46 0',
  up:   'M12 19V5M5 12l7-7 7 7',
  down: 'M12 5v14M5 12l7 7 7-7',
  filter:'M4 6h16M7 12h10M10 18h4',
  check:'M20 6L9 17l-5-5',
  alert:'M12 9v4M12 17h.01 M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z',
};
const Ic=({n,s=20,c='currentColor',w=1.8,f='none'})=>(
  <svg width={s} height={s} viewBox="0 0 24 24" fill={f} stroke={c} strokeWidth={w}
       strokeLinecap="round" strokeLinejoin="round">
    {(icons[n]||'').split(' M').map((d,i)=>
      <path key={i} d={(i===0?'':' M')+d}/>)}
  </svg>
);

/* ── CAT ICON CIRCLE ── */
const CatIcon=({cat,size=42})=>{
  const col=CAT_COLORS[cat]||'#6b7280';
  const icMap={Alimentação:'M12 2C8 2 5 5 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-4-3-7-7-7z M12 11a2 2 0 1 0 0-4 2 2 0 0 0 0 4z',
    Transporte:'M5 17H3v-6l2-5h14l2 5v6h-2 M7 17a2 2 0 1 0 4 0 M13 17a2 2 0 1 0 4 0 M3 11h18',
    Saúde:'M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z',
    Lazer:'M9 18V5l12-2v13 M6 21a3 3 0 1 0 0-6 3 3 0 0 0 0 6z M18 19a3 3 0 1 0 0-6 3 3 0 0 0 0 6z',
    Moradia:'M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z M9 21V12h6v9',
    Receita:'M12 2v20 M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6',
    Outros:'M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z M12 8v4l3 3'};
  const d=icMap[cat]||icMap.Outros;
  return(
    <div style={{width:size,height:size,borderRadius:'50%',background:col+'22',
      display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
      <svg width={size*.45} height={size*.45} viewBox="0 0 24 24" fill="none"
           stroke={col} strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round">
        {d.split(' M').map((p,i)=><path key={i} d={(i===0?'':' M')+p}/>)}
      </svg>
    </div>
  );
};

/* ── RING CHART ── */
const Ring=({pct,size=120,stroke=10,color=G,bg='#e5e7eb',children})=>{
  const r=(size-stroke)/2, c=size/2, circ=2*Math.PI*r;
  const off=circ*(1-Math.min(pct,1));
  return(
    <div style={{position:'relative',width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
        <circle cx={c} cy={c} r={r} fill="none" stroke={bg} strokeWidth={stroke}/>
        <circle cx={c} cy={c} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"/>
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',
        alignItems:'center',justifyContent:'center'}}>{children}</div>
    </div>
  );
};

/* ── BAR CHART ── */
const BarChart=({data,selected,onSelect,color=G})=>{
  const max=Math.max(...data.map(d=>d.val),1);
  return(
    <div style={{display:'flex',alignItems:'flex-end',gap:6,height:100,padding:'0 4px'}}>
      {data.map((d,i)=>{
        const h=Math.max((d.val/max)*80,4);
        const sel=selected===i;
        return(
          <div key={i} onClick={()=>onSelect(i)} style={{flex:1,display:'flex',flexDirection:'column',
            alignItems:'center',gap:4,cursor:'pointer'}}>
            <div style={{width:'100%',height:80,display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
              <div style={{width:'60%',height:h,borderRadius:4,
                background:sel?color:'#e5e7eb',transition:'all .2s'}}/>
            </div>
            <span style={{fontSize:9,color:sel?T1:T3,fontWeight:sel?700:400,whiteSpace:'nowrap'}}>{d.label}</span>
          </div>
        );
      })}
    </div>
  );
};

/* ── BOTTOM NAV ── */
const Nav=({cur,go,onAdd})=>{
  const items=[
    {k:'dash',n:'home',l:'Início'},
    {k:'extrato',n:'chart',l:'Extrato'},
    {k:'__',n:'add',l:''},
    {k:'orc',n:'card',l:'Orçamento'},
    {k:'perfil',n:'user',l:'Perfil'},

  return(
    <div style={{height:80,background:W,borderTop:'1px solid #f0f0f0',
      display:'flex',alignItems:'center',padding:'0 4px 16px',flexShrink:0,
      boxShadow:'0 -4px 16px rgba(0,0,0,.04)'}}>
      {items.map(item=>item.k==='__'?(
        <div key="fab" onClick={onAdd} style={{flex:1,display:'flex',justifyContent:'center'}}>
          <div style={{width:52,height:52,background:G,borderRadius:'50%',
            display:'flex',alignItems:'center',justifyContent:'center',
            boxShadow:`0 4px 16px ${G}66`,cursor:'pointer'}}>
            <Ic n="add" s={24} c={W} w={2.5}/>
          </div>
        </div>
      ):(
        <div key={item.k} onClick={()=>go(item.k)}
          style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',
            gap:2,padding:'6px 0',cursor:'pointer'}}>
          <Ic n={item.n} s={22} c={cur===item.k?G:T3} w={cur===item.k?2.2:1.8}/>
          <span style={{fontSize:10,color:cur===item.k?G:T3,fontWeight:cur===item.k?600:400}}>{item.l}</span>
        </div>
      ))}
    </div>
  );
};

/* ═══════════════════════════════════════════════════
   SCREEN: ESQUECI SENHA
═══════════════════════════════════════════════════ */
const EsqueciSenha=({onBack})=>{
  const [email,setEmail]=useState('');
  const [sent,setSent]=useState(false);
  const [err,setErr]=useState('');
  const handle=()=>{
    if(!/\S+@\S+\.\S+/.test(email)){setErr('Digite um e-mail válido.');return}
    setSent(true);
  };
  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',background:W}}>
      <div style={{background:`linear-gradient(160deg,#064e3b,${G})`,borderRadius:'0 0 36px 36px',
        padding:'0 0 32px',flexShrink:0}}>
        <SB dark/>
        <div style={{display:'flex',alignItems:'center',gap:14,padding:'0 20px 4px'}}>
          <button onClick={onBack} style={{width:36,height:36,borderRadius:'50%',
            background:'rgba(255,255,255,.2)',border:'none',cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Ic n="back" s={18} c={W} w={2.5}/>
          </button>
          <span style={{color:W,fontSize:17,fontWeight:700}}>Recuperar senha</span>
        </div>
      </div>
      <div style={{flex:1,padding:'32px 28px',display:'flex',flexDirection:'column'}}>
        {!sent?(
          <>
            <div style={{width:64,height:64,borderRadius:'50%',background:GL,
              display:'flex',alignItems:'center',justifyContent:'center',marginBottom:20}}>
              <Ic n="bell" s={28} c={G}/>
            </div>
            <div style={{fontSize:22,fontWeight:800,color:T1,marginBottom:6}}>Esqueceu sua senha?</div>
            <div style={{fontSize:14,color:T2,marginBottom:28,lineHeight:1.5}}>
              Digite seu e-mail e enviaremos um link para você criar uma nova senha.
            </div>
            <div style={{fontSize:12,fontWeight:600,color:T2,marginBottom:6,textTransform:'uppercase',letterSpacing:.5}}>E-MAIL</div>
            <div style={{display:'flex',alignItems:'center',gap:10,background:GR,
              border:`1.5px solid ${err?R:'#e5e7eb'}`,borderRadius:14,padding:'13px 16px',marginBottom:err?8:24}}>
              <Ic n="bell" s={18} c={T3}/>
              <input type="email" value={email} onChange={e=>{setEmail(e.target.value);setErr('')}}
                placeholder="seu@email.com" onKeyDown={e=>e.key==='Enter'&&handle()}
                style={{flex:1,border:'none',background:'none',outline:'none',fontSize:15,color:T1,fontFamily:'inherit'}}/>
            </div>
            {err&&<div style={{color:R,fontSize:12,marginBottom:18}}>{err}</div>}
            <button onClick={handle} style={{background:G,color:W,border:'none',borderRadius:14,
              padding:17,fontSize:16,fontWeight:700,cursor:'pointer',fontFamily:'inherit',
              boxShadow:`0 4px 16px ${G}44`}}>
              Enviar link de recuperação
            </button>
            <button onClick={onBack} style={{background:'none',border:'none',color:T2,
              fontSize:14,cursor:'pointer',fontFamily:'inherit',marginTop:16,padding:8}}>
              Voltar ao login
            </button>
          </>
        ):(
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:16,paddingTop:40}}>
            <div style={{width:80,height:80,borderRadius:'50%',background:GL,
              display:'flex',alignItems:'center',justifyContent:'center'}}>
              <Ic n="check" s={36} c={G} w={2.5}/>
            </div>
            <div style={{fontSize:22,fontWeight:800,color:T1,textAlign:'center'}}>E-mail enviado!</div>
            <div style={{fontSize:14,color:T2,textAlign:'center',lineHeight:1.6}}>
              Verifique sua caixa de entrada em<br/>
              <strong style={{color:T1}}>{email}</strong><br/>
              e siga as instruções para redefinir sua senha.
            </div>
            <button onClick={onBack} style={{background:G,color:W,border:'none',borderRadius:14,
              padding:'15px 40px',fontSize:16,fontWeight:700,cursor:'pointer',fontFamily:'inherit',
              boxShadow:`0 4px 16px ${G}44`,marginTop:8}}>
              Voltar ao login
            </button>
          </div>
        )}
      </div>
    </div>
  );
};

/* ═══════════════════════════════════════════════════
   SCREEN: CRIAR CONTA
═══════════════════════════════════════════════════ */
const CriarConta=({onBack,onCreated})=>{
  const [step,setStep]=useState(1); // 1=dados, 2=sucesso
  const [f,setF]=useState({nome:'',email:'',senha:'',conf:''});
  const [errs,setErrs]=useState({});
  const set=(k,v)=>{setF(p=>({...p,[k]:v}));setErrs(p=>({...p,[k]:''}))};
  const validate=()=>{
    const e={};
    if(!f.nome.trim()||f.nome.trim().length<3) e.nome='Nome deve ter pelo menos 3 caracteres.';
    if(!/\S+@\S+\.\S+/.test(f.email)) e.email='E-mail inválido.';
    if(f.senha.length<6) e.senha='Senha deve ter pelo menos 6 caracteres.';
    if(f.senha!==f.conf) e.conf='Senhas não conferem.';
    return e;
  };
  const handle=()=>{
    const e=validate(); if(Object.keys(e).length){setErrs(e);return}
    save('fc_user',{email:f.email,nome:f.nome}); setStep(2);
  };
  if(step===2) return(
    <div style={{flex:1,display:'flex',flexDirection:'column',background:W}}>
      <div style={{background:`linear-gradient(160deg,#064e3b,${G})`,borderRadius:'0 0 36px 36px',padding:'0 0 32px',flexShrink:0}}>
        <SB dark/>
        <div style={{display:'flex',alignItems:'center',gap:14,padding:'0 20px 4px'}}>
          <span style={{color:W,fontSize:17,fontWeight:700}}>Conta criada</span>
        </div>
      </div>
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',
        justifyContent:'center',padding:'0 28px',gap:16}}>
        <div style={{width:88,height:88,borderRadius:'50%',background:GL,
          display:'flex',alignItems:'center',justifyContent:'center'}}>
          <Ic n="check" s={40} c={G} w={2.5}/>
        </div>
        <div style={{fontSize:24,fontWeight:900,color:T1,textAlign:'center'}}>Bem-vindo, {f.nome.split(' ')[0]}!</div>
        <div style={{fontSize:14,color:T2,textAlign:'center',lineHeight:1.6}}>
          Sua conta foi criada com sucesso.<br/>Comece a controlar suas finanças agora.
        </div>
        <button onClick={onCreated} style={{background:G,color:W,border:'none',borderRadius:14,
          padding:'16px 48px',fontSize:16,fontWeight:700,cursor:'pointer',fontFamily:'inherit',
          boxShadow:`0 4px 16px ${G}44`,marginTop:8}}>
          Acessar o app
        </button>
      </div>
    </div>
  );
  const fields=[
    {k:'nome',l:'NOME COMPLETO',t:'text',ph:'João da Silva'},
    {k:'email',l:'E-MAIL',t:'email',ph:'seu@email.com'},
    {k:'senha',l:'SENHA',t:'password',ph:'Mínimo 6 caracteres'},
    {k:'conf',l:'CONFIRMAR SENHA',t:'password',ph:'Repita a senha'},
  ];
  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',background:W,overflow:'hidden'}}>
      <div style={{background:`linear-gradient(160deg,#064e3b,${G})`,borderRadius:'0 0 36px 36px',
        padding:'0 0 28px',flexShrink:0}}>
        <SB dark/>
        <div style={{display:'flex',alignItems:'center',gap:14,padding:'0 20px 4px'}}>
          <button onClick={onBack} style={{width:36,height:36,borderRadius:'50%',
            background:'rgba(255,255,255,.2)',border:'none',cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Ic n="back" s={18} c={W} w={2.5}/>
          </button>
          <span style={{color:W,fontSize:17,fontWeight:700}}>Criar conta gratuita</span>
        </div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'24px 28px 28px'}}>

const Nova=({onSave,onBack})=>{
  const [tipo,setTipo]=useState('despesa');
  const [val,setVal]=useState('');
  const [desc,setDesc]=useState('');
  const [cat,setCat]=useState('Alimentação');
  const [pay,setPay]=useState('Débito');
  const [errs,setErrs]=useState({});
  const [saved,setSaved]=useState(false);

  const cats=['Alimentação','Transporte','Saúde','Lazer','Moradia','Outros'];
  const pays=['Débito','Crédito','Pix','Transferência','Dinheiro'];

  const handle=()=>{
    const e={};
    if(!desc.trim()) e.desc='Descrição obrigatória';
    const n=parseFloat(val.replace(',','.'));
    if(!val||isNaN(n)||n<=0) e.val='Valor inválido';
    if(Object.keys(e).length){setErrs(e);return}
    setSaved(true);
    setTimeout(()=>{
      onSave({id:Date.now(),desc:desc.trim(),cat:tipo==='receita'?'Receita':cat,
        type:tipo,val:parseFloat(val.replace(',','.')),date:today(),pay});
    },900);
  };

  if(saved) return(
    <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',
      justifyContent:'center',background:W,gap:16}}>
      <div style={{width:72,height:72,borderRadius:'50%',background:GL,
        display:'flex',alignItems:'center',justifyContent:'center'}}>
        <Ic n="check" s={32} c={G} w={2.5}/>
      </div>
      <div style={{fontSize:20,fontWeight:800,color:T1}}>Salvo com sucesso!</div>
      <div style={{fontSize:14,color:T2}}>Redirecionando para o extrato...</div>
    </div>
  );

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',background:BG,overflow:'hidden'}}>
      {/* Header */}
      <div style={{background:W,flexShrink:0,borderBottom:'1px solid #f0f0f0'}}>
        <SB/>
        <div style={{display:'flex',alignItems:'center',padding:'0 16px 14px',gap:12}}>
          <button onClick={onBack} style={{width:36,height:36,borderRadius:'50%',
            background:GR,border:'none',display:'flex',alignItems:'center',
            justifyContent:'center',cursor:'pointer'}}>
            <Ic n="back" s={18} c={T1} w={2.5}/>
          </button>
          <div style={{flex:1,fontSize:17,fontWeight:800,color:T1,textAlign:'center'}}>Nova Transação</div>
          <button onClick={onBack} style={{width:36,height:36,borderRadius:'50%',
            background:GR,border:'none',display:'flex',alignItems:'center',
            justifyContent:'center',cursor:'pointer'}}>
            <Ic n="x" s={16} c={T2} w={2.5}/>
          </button>
        </div>
        {/* Type tabs */}
        <div style={{display:'flex',margin:'0 16px 16px',background:GR,borderRadius:12,padding:4,gap:4}}>
          {['despesa','receita'].map(t=>(
            <button key={t} onClick={()=>{setTipo(t);if(t==='receita')setCat('Receita')}}
              style={{flex:1,padding:'10px',borderRadius:9,border:'none',cursor:'pointer',
                fontFamily:'inherit',fontSize:14,fontWeight:700,transition:'all .2s',
                background:tipo===t?W:'transparent',
                color:tipo===t?(t==='despesa'?R:G):T3,
                boxShadow:tipo===t?'0 2px 8px rgba(0,0,0,.08)':'none'}}>
              {t==='despesa'?'↓ Despesa':'↑ Receita'}
            </button>
          ))}
        </div>
      </div>

      {/* Value display */}
      <div style={{background:tipo==='despesa'?T1:'#064e3b',padding:'24px 20px',
        textAlign:'center',flexShrink:0,position:'relative'}}>
        <div style={{position:'absolute',top:12,right:16,
          background:tipo==='despesa'?R:G,color:W,fontSize:10,fontWeight:700,
          padding:'4px 10px',borderRadius:20}}>
          {tipo==='despesa'?'— SAÍDA':'+ ENTRADA'}
        </div>
        <div style={{color:'rgba(255,255,255,.5)',fontSize:11,textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>VALOR</div>
        <div style={{display:'flex',alignItems:'baseline',justifyContent:'center',gap:4}}>
          <span style={{color:'rgba(255,255,255,.6)',fontSize:20,fontWeight:600}}>R$</span>
          <input value={val} onChange={e=>setVal(e.target.value.replace(/[^0-9,]/g,''))}
            placeholder="0,00" inputMode="decimal"
            style={{background:'none',border:'none',outline:'none',color:W,
              fontSize:52,fontWeight:900,letterSpacing:-2,textAlign:'center',
              width:180,fontFamily:'inherit'}}/>
        </div>
        {errs.val&&<div style={{color:'#fca5a5',fontSize:12,marginTop:4}}>{errs.val}</div>}
      </div>

      {/* Form */}
      <div style={{flex:1,overflowY:'auto',padding:16}}>
        {/* Description */}
        <div style={{background:W,borderRadius:14,padding:'12px 14px',marginBottom:10,
          border:`1.5px solid ${errs.desc?R:'transparent'}`}}>
          <div style={{fontSize:10,color:T3,fontWeight:600,marginBottom:4,textTransform:'uppercase',letterSpacing:.5}}>DESCRIÇÃO</div>
          <input value={desc} onChange={e=>{setDesc(e.target.value);setErrs(p=>({...p,desc:''}))}}
            placeholder="Ex: Supermercado Extra"
            style={{border:'none',outline:'none',fontSize:15,color:T1,width:'100%',fontFamily:'inherit',background:'none'}}/>
          {errs.desc&&<div style={{color:R,fontSize:11,marginTop:4}}>{errs.desc}</div>}

        {/* Category (hide for receita) */}
        {tipo==='despesa'&&(
          <div style={{background:W,borderRadius:14,padding:'12px 14px',marginBottom:10}}>
            <div style={{fontSize:10,color:T3,fontWeight:600,marginBottom:8,textTransform:'uppercase',letterSpacing:.5}}>CATEGORIA</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>

                    background:cat===c?G:GR,color:cat===c?W:T2,transition:'all .15s'}}>
                  {c}
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Payment */}
        <div style={{background:W,borderRadius:14,padding:'12px 14px',marginBottom:10}}>
          <div style={{fontSize:10,color:T3,fontWeight:600,marginBottom:8,textTransform:'uppercase',letterSpacing:.5}}>FORMA DE PAGAMENTO</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {pays.map(p=>(
              <button key={p} onClick={()=>setPay(p)}
                style={{padding:'6px 12px',borderRadius:20,border:'none',cursor:'pointer',
                  fontFamily:'inherit',fontSize:12,fontWeight:600,
                  background:pay===p?G:GR,color:pay===p?W:T2,transition:'all .15s'}}>
                {p}
              </button>
            ))}
          </div>
        </div>

        <button onClick={handle}
          style={{background:G,color:W,border:'none',borderRadius:14,padding:17,
            fontSize:16,fontWeight:700,width:'100%',cursor:'pointer',fontFamily:'inherit',
            boxShadow:`0 4px 16px ${G}44`,marginTop:4}}>
          Salvar Transação
        </button>
      </div>
    </div>
  );

/* ═══════════════════════════════════════════════════
   SCREEN: EXTRATO
═══════════════════════════════════════════════════ */
const Extrato=({trans,go,onAdd})=>{
  const [filter,setFilter]=useState('todos');

  const rec=trans.filter(t=>t.type==='receita').reduce((s,t)=>s+t.val,0);
  const desp=trans.filter(t=>t.type==='despesa').reduce((s,t)=>s+t.val,0);

  const list=filter==='todos'?trans:trans.filter(t=>t.type===filter);
  const groups={};
  list.forEach(t=>{if(!groups[t.date])groups[t.date]=[];groups[t.date].push(t)});
  const dates=Object.keys(groups).sort((a,b)=>b.localeCompare(a));

  const fmtDate=d=>{
    if(d==='2026-05-09')return'Hoje · 09/05/2026';
    if(d==='2026-05-08')return'Ontem · 08/05/2026';
    return d.split('-').reverse().join('/');
  };

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',background:BG,overflow:'hidden'}}>
      <div style={{background:W,flexShrink:0,borderBottom:'1px solid #f0f0f0'}}>
        <SB/>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 20px 14px'}}>
          <div>
            <div style={{fontSize:24,fontWeight:900,color:T1}}>Extrato</div>
            <div style={{fontSize:12,color:T2}}>{trans.length} transações em Maio</div>
          </div>
          <div style={{display:'flex',gap:8}}>
            {['search','filter'].map(n=>(
              <div key={n} style={{width:38,height:38,background:GR,borderRadius:'50%',
                display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
                <Ic n={n} s={17} c={T2}/>
              </div>
            ))}
          </div>
        </div>
        {/* Summary */}
        <div style={{display:'flex',gap:8,padding:'0 16px 14px'}}>
          {[{l:'Receitas',v:rec,c:G},{l:'Despesas',v:desp,c:R},{l:'Saldo',v:rec-desp,c:T1}].map(s=>(
            <div key={s.l} style={{flex:1,background:GR,borderRadius:12,padding:'10px 10px'}}>
              <div style={{fontSize:9,color:T3,fontWeight:600,marginBottom:3}}>{s.l.toUpperCase()}</div>
              <div style={{fontSize:13,fontWeight:800,color:s.c}}>
                R${Math.abs(s.v).toLocaleString('pt-BR',{minimumFractionDigits:0})}
              </div>
            </div>
          ))}
        </div>
        {/* Filter tabs */}
        <div style={{display:'flex',gap:8,padding:'0 16px 14px'}}>
          {[{k:'todos',l:'Todos'},{k:'receita',l:'Receitas'},{k:'despesa',l:'Despesas'}].map(f=>(
            <button key={f.k} onClick={()=>setFilter(f.k)}
              style={{padding:'7px 14px',borderRadius:20,border:'none',cursor:'pointer',
                fontFamily:'inherit',fontSize:13,fontWeight:600,
                background:filter===f.k?G:W,color:filter===f.k?W:T2,
                boxShadow:filter===f.k?`0 2px 8px ${G}44`:'0 1px 4px rgba(0,0,0,.06)'}}>
              {f.l}
            </button>
          ))}
        </div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'4px 16px 16px'}}>
        {dates.map(date=>{
          const day=groups[date];
          const dayNet=day.reduce((s,t)=>t.type==='despesa'?s-t.val:s+t.val,0);
          return(
            <div key={date}>
              <div style={{display:'flex',justifyContent:'space-between',padding:'12px 4px 6px'}}>
                <span style={{fontSize:11,fontWeight:700,color:T3,textTransform:'uppercase'}}>{fmtDate(date)}</span>
                <span style={{fontSize:11,fontWeight:700,color:dayNet>=0?G:R}}>
                  {dayNet>=0?'+':''}{dayNet.toLocaleString('pt-BR',{minimumFractionDigits:2})}
                </span>
              </div>
              {day.map(t=>(
                <div key={t.id} style={{background:W,borderRadius:14,padding:'12px 14px',
                  display:'flex',alignItems:'center',gap:12,marginBottom:8,
                  boxShadow:'0 1px 4px rgba(0,0,0,.04)'}}>
                  <CatIcon cat={t.cat}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:600,color:T1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.desc}</div>
                    <div style={{fontSize:12,color:T2}}>{t.cat} · {t.pay}</div>
                  </div>
                  <div style={{fontSize:14,fontWeight:700,color:t.type==='despesa'?R:G,flexShrink:0}}>
                    {t.type==='despesa'?'–':'+'}R${t.val.toLocaleString('pt-BR',{minimumFractionDigits:2})}
                  </div>
                </div>
              ))}
            </div>
          );
        })}
      </div>
      <Nav cur="extrato" go={go} onAdd={onAdd}/>
    </div>
  );
};

/* ═══════════════════════════════════════════════════
   SCREEN: ORÇAMENTOS
═══════════════════════════════════════════════════ */
const Orcamentos=({trans,go,onAdd})=>{
  const [sel,setSel]=useState('Alimentação');
  const cat=sel;
  const limit=BUDGETS[sel]||0;
  const spent=trans.filter(t=>t.type==='despesa'&&t.cat===sel).reduce((s,t)=>s+t.val,0);
  const pct=limit>0?spent/limit:0;
  const col=pct>=.9?R:pct>=.6?'#f59e0b':G;

  // Monthly bars (simulated)
  const months=['Jan','Fev','Mar','Abr','Mai','Jun'];
  const barData=months.map((m,i)=>({label:m,val:i===4?spent:Math.random()*limit*.9+limit*.1}));
  const [selBar,setSelBar]=useState(4);

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',background:BG,overflow:'hidden'}}>
      <div style={{background:W,flexShrink:0,borderBottom:'1px solid #f0f0f0'}}>
        <SB/>
        <div style={{padding:'0 20px 14px'}}>
          <div style={{fontSize:24,fontWeight:900,color:T1}}>Orçamentos</div>
          <div style={{fontSize:12,color:T2}}>Maio 2026</div>
        </div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'16px 16px'}}>
        {/* Category selector */}
        <div style={{display:'flex',gap:10,marginBottom:20,overflowX:'auto',paddingBottom:4}}>
          {Object.entries(BUDGETS).map(([c,lim])=>{
            const sp=trans.filter(t=>t.type==='despesa'&&t.cat===c).reduce((s,t)=>s+t.val,0);
            const p=sp/lim;
            const cc=p>=.9?R:p>=.6?'#f59e0b':G;
            return(
              <div key={c} onClick={()=>setSel(c)}
                style={{background:sel===c?G:W,borderRadius:14,padding:'10px 14px',
                  flexShrink:0,cursor:'pointer',textAlign:'center',minWidth:72,
                  boxShadow:sel===c?`0 4px 16px ${G}44`:'0 1px 4px rgba(0,0,0,.06)',
                  transition:'all .2s'}}>
                <div style={{fontSize:11,fontWeight:700,color:sel===c?W:T1}}>{c}</div>
                <div style={{fontSize:12,fontWeight:800,color:sel===c?'rgba(255,255,255,.8)':cc,marginTop:2}}>
                  {Math.round(p*100)}%
                </div>
              </div>
            );
          })}
        </div>

        {/* Big ring */}
        <div style={{background:W,borderRadius:24,padding:24,marginBottom:16,
          display:'flex',flexDirection:'column',alignItems:'center',
          boxShadow:'0 2px 12px rgba(0,0,0,.06)'}}>
          <Ring pct={pct} size={140} stroke={14} color={col}>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:22,fontWeight:900,color:T1}}>
                {Math.round(pct*100)}%
              </div>
            </div>
          </Ring>
          <div style={{fontSize:18,fontWeight:800,color:T1,marginTop:12}}>
            {fmt(spent)} <span style={{fontSize:13,fontWeight:400,color:T2}}>de {fmt(limit)}</span>
          </div>
          <div style={{fontSize:13,color:T2,marginTop:4}}>
            Disponível: <span style={{color:G,fontWeight:700}}>{fmt(Math.max(limit-spent,0))}</span>
          </div>
          {pct>=.9&&(
            <div style={{background:RL,borderRadius:10,padding:'8px 14px',marginTop:12,
              display:'flex',alignItems:'center',gap:6}}>
              <Ic n="alert" s={14} c={R}/>
              <span style={{fontSize:12,color:R,fontWeight:600}}>Orçamento quase esgotado!</span>
            </div>
          )}
        </div>

        {/* Bar chart */}
        <div style={{background:W,borderRadius:24,padding:'20px 20px 16px',
          boxShadow:'0 2px 12px rgba(0,0,0,.06)'}}>
          <div style={{fontSize:14,fontWeight:700,color:T1,marginBottom:4}}>Histórico — {sel}</div>
          <div style={{fontSize:12,color:T2,marginBottom:16}}>Gasto mensal em 2026</div>
          <BarChart data={barData} selected={selBar} onSelect={setSelBar} color={col}/>
          <div style={{marginTop:12,padding:'12px 0 0',borderTop:'1px solid #f0f0f0',
            display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontSize:11,color:T3}}>Selecionado</div>
              <div style={{fontSize:16,fontWeight:800,color:T1}}>
                {fmt(barData[selBar]?.val||0)} <span style={{fontSize:12,color:T2}}>/ {fmt(limit)}</span>
              </div>
            </div>
            <div style={{fontSize:12,color:T2}}>{barData[selBar]?.label} 2026</div>
          </div>
        </div>
      </div>
      <Nav cur="orc" go={go} onAdd={onAdd}/>
    </div>
  );
};

/* ═══════════════════════════════════════════════════
   MODAL OVERLAY
═══════════════════════════════════════════════════ */
const Modal=({title,onClose,children})=>(
  <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.5)',
    display:'flex',flexDirection:'column',justifyContent:'flex-end',zIndex:200,backdropFilter:'blur(4px)'}}>
    <div style={{background:W,borderRadius:'24px 24px 0 0',padding:'20px 20px 36px',
      maxHeight:'85%',overflowY:'auto'}}>
      <div style={{width:40,height:4,background:'#e5e7eb',borderRadius:2,margin:'0 auto 18px'}}/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
        <div style={{fontSize:18,fontWeight:800,color:T1}}>{title}</div>
        <button onClick={onClose} style={{width:34,height:34,borderRadius:'50%',background:GR,
          border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <Ic n="x" s={16} c={T2} w={2.5}/>
        </button>
      </div>
      {children}
    </div>
  </div>
);

/* ═══════════════════════════════════════════════════
   SCREEN: PERFIL
═══════════════════════════════════════════════════ */

        </div>

          marginBottom:16,display:'flex',alignItems:'center',gap:16,
          boxShadow:`0 6px 24px ${G}44`}}>
          <div style={{width:60,height:60,borderRadius:'50%',background:'rgba(255,255,255,.2)',
            display:'flex',alignItems:'center',justifyContent:'center',
            color:W,fontSize:20,fontWeight:800,flexShrink:0,
            border:'2px solid rgba(255,255,255,.3)'}}>SH</div>
          <div style={{flex:1}}>
            <div style={{fontSize:17,fontWeight:800,color:W}}>{user.nome}</div>
            <div style={{fontSize:13,color:'rgba(255,255,255,.7)'}}>{user.email}</div>
            <div style={{display:'inline-block',background:'rgba(255,255,255,.2)',color:W,
              fontSize:11,fontWeight:700,padding:'3px 10px',borderRadius:20,marginTop:6,

        {/* Stats */}

          {items.map((item,i)=>(

                display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>

              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:600,color:T1}}>{item.label}</div>
                <div style={{fontSize:12,color:T2}}>{item.sub}</div>
              </div>
              <svg width={16} height={16} viewBox="0 0 24 24" fill="none" stroke={T3} strokeWidth={2.2}

        <Modal title="Carteiras" onClose={()=>setModal(null)}>

            <div key={c.n} style={{display:'flex',alignItems:'center',gap:14,padding:'14px 0',

                display:'flex',alignItems:'center',justifyContent:'center'}}>
                <svg width={20} height={14} viewBox="0 0 20 14">

                <div style={{fontSize:14,fontWeight:600,color:T1}}>{c.n}</div>

            Fechar

        </Modal>
      )}

};

/* ═══════════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════════ */
function App(){
  const [screen,setScreen]=useState(()=>load('fc_user',null)?'dash':'login');
  const [trans,setTrans]=useState(()=>load('fc_trans',SEED));
  const [nova,setNova]=useState(false);

  const go=useCallback(s=>{setNova(false);setScreen(s)},[]);
  const onAdd=useCallback(()=>setNova(true),[]);
  const onSave=useCallback(t=>{
    setTrans(prev=>{const u=[t,...prev];save('fc_trans',u);return u});
    setNova(false);setScreen('extrato');
  },[]);
  const onLogout=()=>{save('fc_user',null);save('fc_trans',SEED);setScreen('login')};

  if(screen==='login') return <Login
    onLogin={()=>setScreen('dash')}
    onEsqueci={()=>setScreen('esqueci')}
    onCriar={()=>setScreen('criar')}/>;
  if(screen==='esqueci') return <EsqueciSenha onBack={()=>setScreen('login')}/>;
  if(screen==='criar') return <CriarConta onBack={()=>setScreen('login')} onCreated={()=>setScreen('dash')}/>;
  if(nova) return <Nova onSave={onSave} onBack={()=>setNova(false)}/>;
  if(screen==='dash') return <Dashboard trans={trans} go={go} onAdd={onAdd}/>;
  if(screen==='extrato') return <Extrato trans={trans} go={go} onAdd={onAdd}/>;
  if(screen==='orc') return <Orcamentos trans={trans} go={go} onAdd={onAdd}/>;
  if(screen==='perfil') return <Perfil go={go} onAdd={onAdd} onLogout={onLogout} trans={trans}/>;
  return <Dashboard trans={trans} go={go} onAdd={onAdd}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
